<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Search</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
        .bar { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; font-size: 16px; outline: none; }
        button { padding: 0 20px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #1a1a1a; }
        .p { padding: 10px; }
        .n { font-size: 0.8rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 8px; }
        .copy { width: 100%; padding: 10px; background: #222; border: 1px solid #333; color: #007bff; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        #status { text-align: center; color: #555; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="bar">
        <input type="text" id="i" placeholder="Search..." onkeypress="if(event.key==='Enter') run()">
        <button onclick="run()">GO</button>
    </div>
    <div id="status">Ready</div>
    <div class="grid" id="out"></div>

    <script>
        async function run() {
            const q = document.getElementById('i').value.trim();
            if(!q) return;
            const out = document.getElementById('out');
            const status = document.getElementById('status');
            out.innerHTML = "";
            status.innerText = "Querying Edge Proxy...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                if(!data.length) { status.innerText = "No data found."; return; }
                status.innerText = "";
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <img src="${item.thumb}" onerror="this.src='https://placehold.co/200?text=No+Img'">
                        <div class="p"><div class="n">${item.name}</div>
                        <button class="copy" onclick="cp('${item.id}', this)">COPY ID</button></div>`;
                    out.appendChild(el);
                });
            } catch (e) { status.innerText = "Connection failed."; }
        }
        function cp(id, b) {
            navigator.clipboard.writeText(id).then(() => {
                const old = b.innerText; b.innerText = "COPIED!";
                setTimeout(() => { b.innerText = old; }, 1000);
            });
        }
    </script>
</body>
</html>
