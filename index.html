<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Search</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 15px; background: #007bff; border: none; border-radius: 8px; color: #fff; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #111; border: 1px solid #222; border-radius: 10px; padding: 10px; }
        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        .btn { width: 100%; margin-top: 10px; padding: 8px; background: #222; color: #007bff; border: 1px solid #333; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bar">
        <input type="text" id="i" placeholder="Search...">
        <button onclick="run()">GO</button>
    </div>
    <div id="st" style="color: #666; text-align: center;">Ready</div>
    <div class="grid" id="out"></div>

    <script>
        async function run() {
            const q = document.getElementById('i').value;
            const out = document.getElementById('out');
            const st = document.getElementById('st');
            out.innerHTML = "";
            st.innerText = "Connecting to API...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if (data.error) {
                    st.innerText = "Error: " + data.error;
                    return;
                }

                if (!data.length) {
                    st.innerText = "No results found.";
                    return;
                }

                st.innerText = "";
                data.forEach(a => {
                    const d = document.createElement('div');
                    d.className = 'card';
                    d.innerHTML = `
                        <img src="${a.thumbnailImageUrl || a.imageUrl || ''}">
                        <div style="font-size: 12px; margin-top:5px; overflow:hidden;">${a.name}</div>
                        <button class="btn" onclick="navigator.clipboard.writeText('${a.id}');alert('Copied')">COPY ID</button>
                    `;
                    out.appendChild(d);
                });
            } catch (e) {
                st.innerText = "Failed to reach backend.";
            }
        }
    </script>
</body>
</html>
