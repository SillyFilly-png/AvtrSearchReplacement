<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VRC Search 2026</title>
    <style>
        body { background: #0b0e11; color: #e9ecef; font-family: 'Segoe UI', system-ui; padding: 15px; margin: 0; }
        .search-container { display: flex; gap: 10px; position: sticky; top: 10px; z-index: 10; background: #0b0e11; padding-bottom: 15px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #2d333b; background: #161b22; color: white; font-size: 16px; outline: none; }
        button { padding: 0 20px; border-radius: 10px; border: none; background: #238636; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #2ea043; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: #161b22; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; animation: fadeIn 0.3s ease; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #010409; }
        .info { padding: 10px; }
        .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .copy-btn { width: 100%; padding: 8px; background: #21262d; border: 1px solid #30363d; color: #58a6ff; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="q" placeholder="Search Avatars..." onkeypress="if(event.key==='Enter') doSearch()">
        <button onclick="doSearch()">SCAN</button>
    </div>
    <div id="status" style="text-align: center; color: #8b949e; margin: 20px;">Enter a keyword to begin</div>
    <div class="grid" id="results"></div>

    <script>
        async function doSearch() {
            const query = document.getElementById('q').value.trim();
            if(!query) return;
            const resBox = document.getElementById('results');
            const status = document.getElementById('status');
            
            resBox.innerHTML = "";
            status.innerText = "Querying Edge Proxy...";

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if(!data || data.length === 0) {
                    status.innerText = "No results found.";
                    return;
                }

                status.innerText = "";
                data.forEach(av => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <img src="${av.thumbnailImageUrl || av.imageUrl || ''}" loading="lazy">
                        <div class="info">
                            <div class="name">${av.name}</div>
                            <button class="copy-btn" onclick="copyId('${av.id}', this)">COPY ID</button>
                        </div>`;
                    resBox.appendChild(div);
                });
            } catch (err) {
                status.innerText = "Error: Proxy Blocked or Offline.";
            }
        }

        function copyId(id, btn) {
            navigator.clipboard.writeText(id);
            const original = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.color = "#3fb950";
            setTimeout(() => { btn.innerText = original; btn.style.color = "#58a6ff"; }, 1000);
        }
    </script>
</body>
</html>
