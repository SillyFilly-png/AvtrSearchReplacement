<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avatar Search</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; outline: none; }
        button#go { padding: 0 25px; border-radius: 12px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #1a1a1a; }
        .p { padding: 10px; }
        .n { font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .a { font-size: 0.7rem; color: #777; margin-bottom: 10px; }
        .copy { width: 100%; padding: 10px; background: #007bff1a; border: 1px solid #007bff33; color: #007bff; border-radius: 8px; font-weight: bold; font-size: 0.75rem; cursor: pointer; }
        #status { text-align: center; margin-top: 40px; color: #444; }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="input" placeholder="Search..." onkeypress="if(event.key==='Enter') run()">
        <button id="go" onclick="run()">GO</button>
    </div>

    <div id="status">Type and press GO</div>
    <div class="results" id="list"></div>

    <script>
        async function run() {
            const q = document.getElementById('input').value.trim();
            if(!q) return;

            const list = document.getElementById('list');
            const status = document.getElementById('status');
            
            list.innerHTML = "";
            status.innerText = "Querying databases...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const data = await res.json();

                if(!data || data.length === 0) {
                    status.innerText = "No results found for '" + q + "'.";
                    return;
                }

                status.innerText = "";
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `
                        <img src="${item.thumb}" onerror="this.src='https://placehold.co/200?text=No+Img'">
                        <div class="p">
                            <div class="n">${item.name}</div>
                            <div class="a">by ${item.author}</div>
                            <button class="copy" onclick="cp('${item.id}', this)">COPY ID</button>
                        </div>
                    `;
                    list.appendChild(el);
                });
            } catch (e) {
                status.innerText = "API Error. Check Vercel logs.";
            }
        }

        function cp(id, b) {
            navigator.clipboard.writeText(id).then(() => {
                const old = b.innerText;
                b.innerText = "COPIED!";
                b.style.color = "#4bb543";
                setTimeout(() => { b.innerText = old; b.style.color = "#007bff"; }, 1000);
            });
        }
    </script>
</body>
</html>
