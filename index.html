<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Avatar Search</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f0f0f; color: #efefef; padding: 15px; margin: 0; }
        h2 { font-size: 1.2rem; margin-bottom: 15px; color: #fff; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 100; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        button#searchBtn { padding: 0 20px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: #181818; border-radius: 12px; overflow: hidden; border: 1px solid #282828; display: flex; flex-direction: column; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #222; }
        .card-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-name { font-weight: bold; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .card-author { color: #aaa; font-size: 0.75rem; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; }
        .copy-btn { width: 100%; padding: 8px 0; background: #2a2a2a; border: 1px solid #3a3a3a; color: #fff; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
        .copy-btn:active { background: #444; }
        #status { text-align: center; margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2>Universal Search</h2>
    <div class="search-box">
        <input type="text" id="query" placeholder="Search avatars..." autocomplete="off">
        <button id="searchBtn" onclick="search()">Search</button>
    </div>

    <div id="status"></div>
    <div class="results" id="results"></div>

    <script>
        async function search() {
            const queryInput = document.getElementById('query');
            const q = queryInput.value.trim();
            if (!q) return;

            const container = document.getElementById('results');
            const status = document.getElementById('status');
            
            container.innerHTML = "";
            status.innerHTML = "Searching databases...";
            
            try {
                const resp = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                if (!resp.ok) throw new Error('Network error');
                
                const data = await resp.json();
                status.innerHTML = data.length === 0 ? "No results found." : "";
                
                data.forEach(avtr => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const imgUrl = avtr.imageUrl || avtr.thumbnailImageUrl || '';
                    
                    card.innerHTML = `
                        <img src="${imgUrl}" loading="lazy" onerror="this.src='https://placehold.co/200x200/222/555?text=No+Preview'">
                        <div class="card-info">
                            <div>
                                <div class="card-name">${avtr.name || 'Unnamed'}</div>
                                <div class="card-author">by ${avtr.authorName || 'Unknown'}</div>
                            </div>
                            <button class="copy-btn" onclick="copyId('${avtr.id}')">COPY ID</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                status.innerHTML = "Error: Check Vercel logs.";
                console.error(e);
            }
        }

        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "COPIED!";
                btn.style.color = "#4bb543";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.color = "#fff";
                }, 1500);
            });
        }
