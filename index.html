<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Search</title>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 15px; }
        .search-container { display: flex; gap: 8px; margin-bottom: 20px; position: sticky; top: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; }
        button#go { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .card { background: #161616; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #222; }
        .info { padding: 8px; }
        .name { font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy-btn { width: 100%; padding: 8px; background: #333; color: white; border: none; border-radius: 5px; font-size: 0.75rem; cursor: pointer; margin-top: 5px; }
        #msg { text-align: center; color: #888; margin: 20px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="q" placeholder="Avatar name..." onkeypress="if(event.key==='Enter') doSearch()">
        <button id="go" onclick="doSearch()">Search</button>
    </div>

    <div id="msg">Enter a name to search</div>
    <div class="grid" id="out"></div>

    <script>
        async function doSearch() {
            const query = document.getElementById('q').value;
            if (!query) return;

            const out = document.getElementById('out');
            const msg = document.getElementById('msg');
            
            out.innerHTML = "";
            msg.innerText = "Searching all databases...";

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (!data.length) {
                    msg.innerText = "No results found.";
                    return;
                }

                msg.innerText = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    const thumb = item.imageUrl || item.thumbnailImageUrl || 'https://placehold.co/200x200/222/555?text=No+Image';
                    
                    div.innerHTML = `
                        <img src="${thumb}" loading="lazy">
                        <div class="info">
                            <div class="name">${item.name || 'Unnamed'}</div>
                            <button class="copy-btn" onclick="copy('${item.id}', this)">COPY ID</button>
                        </div>
                    `;
                    out.appendChild(div);
                });
            } catch (e) {
                msg.innerText = "Search error. Check Vercel logs.";
            }
        }

        function copy(id, btn) {
            navigator.clipboard.writeText(id).then(() => {
                const oldText = btn.innerText;
                btn.innerText = "COPIED!";
                btn.style.background = "#28a745";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.background = "#333";
                }, 1500);
            });
        }
    </script>
</body>
</html>
