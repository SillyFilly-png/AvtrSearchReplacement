<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: #010409; color: #c9d1d9; font-family: sans-serif; padding: 15px; margin: 0; }
        .box { display: flex; gap: 8px; position: sticky; top: 0; background: #010409; padding: 10px 0; }
        input { flex: 1; padding: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
        button { padding: 0 20px; background: #238636; color: #fff; border: none; border-radius: 8px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .card { background: #161b22; border-radius: 8px; border: 1px solid #30363d; padding: 8px; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 6px; object-fit: cover; }
        .card div { font-size: 12px; margin: 8px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .copy { width: 100%; background: #21262d; border: 1px solid #30363d; color: #58a6ff; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>
    <div class="box">
        <input type="text" id="i" placeholder="Search Avatars...">
        <button onclick="go()">GO</button>
    </div>
    <div id="st" style="text-align: center; color: #8b949e; margin-top: 20px;">Ready</div>
    <div class="grid" id="out"></div>

    <script>
        async function go() {
            const q = document.getElementById('i').value;
            const st = document.getElementById('st');
            const out = document.getElementById('out');
            if(!q) return;
            st.innerText = "Searching...";
            out.innerHTML = "";
            
            try {
                const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
                const d = await r.json();
                if(!d.length) { st.innerText = "No results found."; return; }
                st.innerText = "";
                d.forEach(a => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `<img src="${a.thumbnailImageUrl || ''}"><div title="${a.name}">${a.name}</div><button class="copy" onclick="cp('${a.id}', this)">COPY ID</button>`;
                    out.appendChild(el);
                });
            } catch(e) { st.innerText = "Search failed."; }
        }
        function cp(id, b) {
            navigator.clipboard.writeText(id);
            b.innerText = "COPIED!";
            setTimeout(() => b.innerText = "COPY ID", 1000);
        }
    </script>
</body>
</html>
